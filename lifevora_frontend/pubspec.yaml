name: lifevora_app
description: Lifevora - Fitness & Well-Being Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # UI Components
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  
  # Image Picker
  image_picker: ^1.0.7
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # HTTP
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/